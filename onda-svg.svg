<svg viewBox="0 0 650 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: 'Segoe UI', Arial, sans-serif; 
      font-size: 26px; 
      font-weight: bold; 
      animation: wave 1.5s ease-in-out infinite;
    }
    @keyframes wave { 
      0%, 100% { transform: translateY(0px); } 
      50% { transform: translateY(-10px); } 
    }
    .w1 { animation-delay: 0.0s; fill: #9c27b0; } 
    .w2 { animation-delay: 0.1s; fill: #00bcd4; } 
    .w3 { animation-delay: 0.2s; fill: #8bc34a; }
    .w4 { animation-delay: 0.3s; fill: #ffeb3b; } 
    .w5 { animation-delay: 0.4s; fill: #ff9800; } 
    .w6 { animation-delay: 0.5s; fill: #e91e63; }
    .w7 { animation-delay: 0.6s; fill: #9c27b0; } 
  </style>
  <text x="10" y="50" class="text w1">Muito</text>
  <text x="90" y="50" class="text w2">bem</text>
  <text x="148" y="50" class="text w3">vindo(a)!</text>
  <text x="270" y="50" class="text w4">Sou</text>
  <text x="325" y="50" class="text w5">o</text>
  <text x="350" y="50" class="text w6">Vitor</text>
  <text x="420" y="50" class="text w7">Rodrigues Santos</text>
</svg>
